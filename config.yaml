model_list:
  # GOOGLE GEMINI MODELS

  # LM STUDIO MODELS
  - model_name: qwen3-embedding
    litellm_params:
      model: lm_studio/text-embedding-qwen3-embedding-0.6b
    model_info:
      mode: embedding
      max_input_tokens: 32768
      input_cost_per_token: 0
      output_cost_per_token: 0

  # GITHUB MODELS

  # GITHUB COPILOT MODELS
  - model_name: anthropic/claude-sonnet-4.6
    litellm_params:
      model: github_copilot/claude-sonnet-4.6
      rpm: 10
      extra_headers:
        editor-version: "vscode/1.85.1"
        editor-plugin-version: "copilot/1.155.0"
        Copilot-Integration-Id: "vscode-chat"
        user-agent: "GithubCopilot/1.155.0"
        Copilot-Vision-Request: "true"
    model_info:
      max_input_tokens: 1000000
      max_output_tokens: 64000
      input_cost_per_token: 0
      output_cost_per_token: 0
      supports_vision: true
      supports_function_calling: true

  - model_name: anthropic/claude-haiku-4.5
    litellm_params:
      model: github_copilot/claude-haiku-4.5
      rpm: 10
      extra_headers:
        editor-version: "vscode/1.85.1"
        editor-plugin-version: "copilot/1.155.0"
        Copilot-Integration-Id: "vscode-chat"
        user-agent: "GithubCopilot/1.155.0"
        Copilot-Vision-Request: "true"
    model_info:
      max_input_tokens: 200000
      max_output_tokens: 64000
      input_cost_per_token: 0
      output_cost_per_token: 0
      supports_vision: true
      supports_function_calling: true

  # MINIMAX MODELS
  # MiniMax-M2.5: context 196608, output 65536, $0.118/M input, $0.99/M output
  - model_name: minimax/MiniMax-M2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
    model_info:
      max_input_tokens: 196608
      max_output_tokens: 65536
      input_cost_per_token: 0.000000118
      output_cost_per_token: 0.00000099
      supports_function_calling: true

  # MiniMax-M2.7: context 204800, output 131072, $0.30/M input, $1.20/M output
  - model_name: minimax/MiniMax-M2.7
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/v1
    model_info:
      max_input_tokens: 204800
      max_output_tokens: 131072
      input_cost_per_token: 0.0000003
      output_cost_per_token: 0.0000012
      supports_function_calling: true

  - model_name: minimax/MiniMax-M2.5-anthropic
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/anthropic/v1/messages
    model_info:
      max_input_tokens: 196608
      max_output_tokens: 65536
      input_cost_per_token: 0.000000118
      output_cost_per_token: 0.00000099
      supports_function_calling: true

  - model_name: minimax/MiniMax-M2.7-anthropic
    litellm_params:
      model: minimax/MiniMax-M2.7
      api_key: os.environ/MINIMAX_API_KEY
      api_base: https://api.minimax.io/anthropic/v1/messages
    model_info:
      max_input_tokens: 204800
      max_output_tokens: 131072
      input_cost_per_token: 0.0000003
      output_cost_per_token: 0.0000012
      supports_function_calling: true

  # OMLX PROVIDED MODELS
  # ASR models
  - model_name: omlx/qwen3-asr-0.6b
    litellm_params:
      model: openai/Qwen3-ASR-0.6B
      api_base: os.environ/OMLX_API_BASE
      api_key: os.environ/OMLX_API_KEY
    model_info:
      mode: audio_transcription
      input_cost_per_token: 0
      output_cost_per_token: 0

  - model_name: omlx/qwen3-asr-1.7b
    litellm_params:
      model: openai/Qwen3-ASR-1.7B
      api_base: os.environ/OMLX_API_BASE
      api_key: os.environ/OMLX_API_KEY
