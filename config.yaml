# LiteLLM Proxy main config
# ============================================================
# v3 修正版
#
# 變更：
# 1. 移除 router.yaml include。
# 2. router_settings 直接放在主 config.yaml，避免 include 子檔只有 router_settings 的相容性疑慮。
# 3. fallbacks / context_window_fallbacks 使用官方建議格式：
#    List[Dict[str, List[str]]]
# 4. 明確設定 num_retries: 2。
# ============================================================

include:
  - /app/litellm-config/models-embedding.yaml
  - /app/litellm-config/models-chatgpt.yaml
  - /app/litellm-config/models-omlx-audio.yaml
  - /app/litellm-config/models-omlx-chat.yaml

litellm_settings:
  # 多 provider gateway 建議保留 true，避免不同 provider 不支援的參數直接讓請求失敗。
  # Debug tool calling / reasoning / response_format 時，可暫時改 false。
  drop_params: true

  # MLflow 走 success/failure callback。
  success_callback: ["mlflow"]
  failure_callback: ["mlflow"]

  # Langfuse 走官方建議的 OTEL 整合（同時涵蓋成功與失敗）。
  # callbacks: ["langfuse_otel"]

  # 長 reasoning / local model / 大上下文請求可能較慢。
  request_timeout: 600

router_settings:
  # simple-shuffle 是多 deployment 時的穩健預設。
  routing_strategy: simple-shuffle

  # 官方格式：List[Dict[str, List[str]]]
  fallbacks:
    - "openai/gpt-5.5": ["openai/gpt-5.4"]
    - "openai/gpt-5.4": ["openai/gpt-5.4-mini"]
    - "openai/gpt-5.4-mini": ["gpt-5.3-codex"]

general_settings:
  # 使用環境變數，不把 master key 寫死。
  master_key: "os.environ/LITELLM_MASTER_KEY"

  # 保留 DB 管理模型，符合你原本設定。
  store_model_in_db: true

  # 明確指定 token rate limit 計算方式。
  token_rate_limit_type: "total"
