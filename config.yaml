# LiteLLM Proxy main config
# ============================================================
# v3 修正版
#
# 變更：
# 1. 移除 router.yaml include。
# 2. router_settings 直接放在主 config.yaml，避免 include 子檔只有 router_settings 的相容性疑慮。
# 3. fallbacks / context_window_fallbacks 使用官方建議格式：
#    List[Dict[str, List[str]]]
# 4. 明確設定 num_retries: 2。
# ============================================================

include:
  - /app/litellm-config/models-embedding.yaml
  - /app/litellm-config/models-chatgpt.yaml
  - /app/litellm-config/models-omlx-audio.yaml
  - /app/litellm-config/models-omlx-chat.yaml

litellm_settings:
  # 多 provider gateway 建議保留 true，避免不同 provider 不支援的參數直接讓請求失敗。
  # Debug tool calling / reasoning / response_format 時，可暫時改 false。
  drop_params: true

  # 保留你的 MLflow callback。
  success_callback: ["mlflow"]
  failure_callback: ["mlflow"]

  # 長 reasoning / local model / 大上下文請求可能較慢。
  request_timeout: 600

router_settings:
  # simple-shuffle 是多 deployment 時的穩健預設。
  routing_strategy: simple-shuffle

  # 明確設定重試次數，避免依賴版本預設值。
  num_retries: 2

  # 在送出 request 前先做 context window 檢查。
  enable_pre_call_checks: true

  # 讓 litellm_params.rpm/tpm 真的進入 pre-call rate-limit enforcement。
  optional_pre_call_checks:
    - enforce_model_rate_limits

  # Provider/model 失敗後進入 cooldown，避免一直打壞掉的 route。
  allowed_fails: 3
  cooldown_time: 30
  disable_cooldowns: false

  # 官方格式：List[Dict[str, List[str]]]
  fallbacks:
    - "openai/gpt-5.5": ["openai/gpt-5.4", "local/qwen3.6-35b-a3b"]
    - "openai/gpt-5.4": ["openai/gpt-5.4-mini", "local/qwen3.6-35b-a3b"]
    - "openai/gpt-5.4-mini": ["local/gemma-4-26b-a4b", "local/qwen3.6-27b"]
    - "openai/gpt-5.3-codex": ["local/gpt-oss-20b", "local/qwen3.6-35b-a3b"]

  # 官方格式同樣是 List[Dict[str, List[str]]]
  context_window_fallbacks:
    - "openai/gpt-5.4-mini": ["local/gemma-4-26b-a4b"]
    - "local/qwen3-vl-8b": ["local/gemma-4-26b-a4b"]

general_settings:
  # 使用環境變數，不把 master key 寫死。
  master_key: "os.environ/LITELLM_MASTER_KEY"

  # 保留 DB 管理模型，符合你原本設定。
  store_model_in_db: true

  # 降低 DB 寫入壓力。
  proxy_batch_write_at: 60

  # 控制 DB connection pool，避免小主機連線數爆掉。
  database_connection_pool_limit: 10

  # 明確指定 token rate limit 計算方式。
  token_rate_limit_type: "total"
