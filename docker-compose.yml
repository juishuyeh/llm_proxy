services:
  nginx:
    image: nginx:alpine
    container_name: llm_proxy_nginx
    restart: always
    ports:
      - "5002:80"   # MLflow 認證代理
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.htpasswd:/etc/nginx/.htpasswd:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      mlflow:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  litellm:
    build:
      context: .
      dockerfile: Dockerfile

    volumes:
      # 主設定檔：只放 include + global settings + router_settings
      - ./config.yaml:/app/config.yaml:ro

      # 拆分後的模型設定
      - ./litellm-config:/app/litellm-config:ro

      # OAuth token persistence
      - github_copilot_auth_data:/root/.config/litellm/github_copilot
      - chatgpt_auth_data:/root/.config/litellm/chatgpt

    command:
      - "--config=/app/config.yaml"

    restart: always

    ports:
      - "4000:4000" # 直接對外暴露的端口
    expose:
      - "4000"      # Docker 內部網路可見，透過 Nginx 訪問

    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      STORE_MODEL_IN_DB: "True"
      GITHUB_COPILOT_TOKEN_DIR: "/root/.config/litellm/github_copilot"
      CHATGPT_TOKEN_DIR: "/root/.config/litellm/chatgpt"

    env_file:
      - .env

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

    depends_on:
      db:
        condition: service_healthy
      mlflow:
        condition: service_started

    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16
    restart: always
    container_name: litellm_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # 注意：此端口暴露用於外部工具連接（如 DBeaver、pgAdmin）
      # 如果不需要外部訪問，可以註解掉此行以提高安全性。
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    container_name: mlflow
    ports:
      - "127.0.0.1:5001:5000"  # 只允許宿主機本地訪問，不暴露到區網
    expose:
      - "5000"
    volumes:
      - mlflow_data:/mlflow/mlruns
    environment:
      # 允許來自外部反向代理 domain 的跨來源 POST 請求。
      MLFLOW_SERVER_CORS_ALLOWED_ORIGINS: "https://${MLFLOW_EXTRA_HOSTS}"
    command:
      - mlflow
      - server
      - --host=0.0.0.0
      - --port=5000
      - --backend-store-uri=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/mlflow
      - --artifacts-destination=/mlflow/mlruns
      - --serve-artifacts
      - --allowed-hosts=mlflow:5000,mlflow,127.0.0.1,localhost,localhost:5001,localhost:5002
    depends_on:
      db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

volumes:
  postgres_data:
    name: litellm_postgres_data
  mlflow_data:
    driver: local
  nginx_logs:
    driver: local
  github_copilot_auth_data:
    driver: local
  chatgpt_auth_data:
    driver: local
